<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Dreams - Cruise Booking</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #ffffff; font-family: 'Apple SD Gothic Neo', sans-serif;
        }
        .container { text-align: center; padding: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #004b91; margin-bottom: 40px; }
        h1 { font-size: 1.8rem; color: #222; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 40px; line-height: 1.6; }
        
        .promo-btn {
            background-color: #004b91;
            color: #fff;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,75,145,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .promo-btn:hover {
            background-color: #00366b;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,75,145,0.3);
        }
        .footer-note { margin-top: 30px; font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">HOUSE OF DREAMS</div>
        <h1>알래스카 크루즈 특가 예약</h1>
        <p>아래 버튼을 클릭하시면 <strong>VIP123</strong> 프로모션 코드가<br>자동 적용된 예약 페이지로 연결됩니다.</p>
        
        <button onclick="applyAndGo()" class="promo-btn">
            할인 혜택 받고 예약하기
        </button>

        <div class="footer-note">※ 폴리트립스 공식 파트너 혜택이 적용됩니다.</div>
    </div>

    <script>
        function applyAndGo() {
            // 버튼 클릭 시점에 보이지 않게 쿠키 주입
            const img = new Image();
            img.src = "https://www.polytrips.com/?_rcode_=VIP123";

            // 0.4초 후 상세 페이지로 이동
            setTimeout(function() {
                window.location.href = "https://cruises.polytrips.com/swift/cruise/package/1523739--Alaska---Seattle?siid=1226793&lang=16";
            }, 400);
        }
    </script>
</body>
</html>
