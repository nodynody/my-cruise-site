<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 혜택 적용 - House of Dreams</title>
    <style>
        /* 이전과 동일한 스타일 */
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .btn-booking { background-color: #004b91; color: white; padding: 20px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <button onclick="safeApply()" class="btn-booking">
        VIP 할인 적용 및 예약하기
    </button>
    
    <p id="msg" style="margin-top:20px; color:#666;">버튼을 누르면 예약 페이지로 연결됩니다.</p>

    <script>
        function safeApply() {
            const promoUrl = "https://www.polytrips.com/?_rcode_=VIP123";
            const targetUrl = "https://cruises.polytrips.com/swift/cruise/package/1523739--Alaska---Seattle?siid=1226793&lang=16";

            // 1. 작은 팝업창을 띄워 코드를 심습니다. 
            // 창 크기를 아주 작게(1x1) 만들어서 사용자 눈에 덜 띄게 합니다.
            const promoPopup = window.open(promoUrl, 'promo', 'width=100,height=100,left=10000,top=10000');

            document.getElementById('msg').innerText = "VIP 혜택을 적용 중입니다. 잠시만 기다려 주세요...";

            // 2. 현재 창은 1초 뒤 상세 페이지로 이동합니다.
            setTimeout(function() {
                if (promoPopup) promoPopup.close(); // 코드가 심어졌을 즈음 팝업 닫기 시도
                window.location.href = targetUrl;
            }, 1200);
        }
    </script>
</body>
</html>
