<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알래스카 크루즈 예약 센터</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background-color: #f4f7f9; font-family: 'Apple SD Gothic Neo', sans-serif;
        }
        .loader {
            border: 5px solid #e1e1e1;
            border-top: 5px solid #004b91;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 25px; color: #333; font-size: 1.1rem; font-weight: 500; }
        .sub-text { margin-top: 10px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p class="text">VIP 프로모션 혜택을 적용 중입니다...</p>
    <p class="sub-text">잠시 후 폴리트립스 예약 페이지로 이동합니다.</p>

    <iframe 
        id="promoFrame" 
        src="https://www.polytrips.com/?_rcode_=VIP123" 
        style="display:none;" 
        onload="redirect()">
    </iframe>

    <script>
        function redirect() {
            const targetUrl = "https://cruises.polytrips.com/swift/cruise/package/1523739--Alaska---Seattle?siid=1226793&lang=16";
            // 0.3초 여유를 두고 이동 (쿠키 안정성 확보)
            setTimeout(function() {
                window.location.replace(targetUrl);
            }, 300);
        }

        // 혹시 모를 로딩 지연 대비 (5초 후 강제이동)
        setTimeout(function() {
            window.location.replace("https://cruises.polytrips.com/swift/cruise/package/1523739--Alaska---Seattle?siid=1226793&lang=16");
        }, 5000);
    </script>
</body>
</html>
